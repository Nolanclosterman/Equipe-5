name: Chatbot Evals

# Lance les évals du chatbot Trico à chaque PR vers main et poste le rapport
# en commentaire. INFORMATIF : ne fait jamais échouer la PR (le runner sort 0).
on:
  pull_request:
    branches: [main]

# Une seule exécution par PR : annule la précédente si on repousse.
concurrency:
  group: evals-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  evals:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Guard — clé API présente ?
        id: guard
        run: |
          if [ -z "${ANTHROPIC_API_KEY}" ]; then
            echo "has_key=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Secret ANTHROPIC_API_KEY absent — évals ignorées. Un admin doit l'ajouter dans Settings > Secrets > Actions."
          else
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: steps.guard.outputs.has_key == 'true'
        run: npm run build

      - name: Start app
        if: steps.guard.outputs.has_key == 'true'
        run: |
          npm run start &
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/ >/dev/null; then echo "App prête"; exit 0; fi
            sleep 1
          done
          echo "::error::L'app n'a pas démarré à temps"; exit 1

      - name: Run evals
        if: steps.guard.outputs.has_key == 'true'
        run: npm run eval
        env:
          EVAL_BASE_URL: http://localhost:3000

      - name: Post report as PR comment
        if: steps.guard.outputs.has_key == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- trico-eval-report -->';
            let body;
            try {
              body = fs.readFileSync('evals/eval-report.md', 'utf8');
            } catch {
              body = marker + '\n⚠️ Rapport d\'éval introuvable (le runner a peut-être échoué — voir les logs du job).';
            }
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
